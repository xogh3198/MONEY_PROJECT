name: CI Pipeline

on:
  pull_request:
    branches: [main]

jobs:
  backend-dividend-engine:
    name: "Build: dividend-engine"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - name: Build
        run: gradle build -x test --no-daemon

  backend-webhook-gateway:
    name: "Build: webhook-gateway"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/webhook-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - name: Build
        run: gradle build -x test --no-daemon

  backend-news-service:
    name: "Build: news-service"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/news-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - name: Build
        run: gradle build -x test --no-daemon

  backend-notification:
    name: "Build: notification"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/notification
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - name: Build
        run: gradle build -x test --no-daemon

  # CI 결과를 PR 코멘트로 남기기
  report-result:
    name: "Report CI Result"
    runs-on: ubuntu-latest
    needs: [backend-dividend-engine, backend-webhook-gateway, backend-news-service, backend-notification]
    if: always()
    steps:
      - name: Comment on PR - Success
        if: ${{ !contains(needs.*.result, 'failure') }}
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **CI 통과** — 모든 서비스 빌드 성공\n\n| 서비스 | 상태 |\n|--------|------|\n| dividend-engine | ✅ |\n| webhook-gateway | ✅ |\n| news-service | ✅ |\n| notification | ✅ |\n\n자동 머지를 진행합니다.'
            })

      - name: Comment on PR - Failure
        if: ${{ contains(needs.*.result, 'failure') }}
        uses: actions/github-script@v7
        with:
          script: |
            const results = {
              'dividend-engine': '${{ needs.backend-dividend-engine.result }}',
              'webhook-gateway': '${{ needs.backend-webhook-gateway.result }}',
              'news-service': '${{ needs.backend-news-service.result }}',
              'notification': '${{ needs.backend-notification.result }}'
            };
            let table = '| 서비스 | 상태 |\n|--------|------|\n';
            for (const [name, status] of Object.entries(results)) {
              table += `| ${name} | ${status === 'success' ? '✅' : '❌ FAILED'} |\n`;
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❌ **CI 실패** — 빌드 에러 발견\n\n${table}\n\n실패한 서비스의 Actions 로그를 확인하고 수정해주세요.\nhttps://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            })

  # CI 전체 통과 시 자동 머지
  auto-merge:
    name: "Auto Merge"
    runs-on: ubuntu-latest
    needs: [backend-dividend-engine, backend-webhook-gateway, backend-news-service, backend-notification]
    if: ${{ !contains(needs.*.result, 'failure') }}
    steps:
      - name: Merge PR
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              merge_method: 'squash'
            })
