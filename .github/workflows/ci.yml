name: CI Pipeline

on:
  pull_request:
    branches: [main]

jobs:
  build-dividend-engine:
    name: "Build: dividend-engine"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - run: gradle build -x test --no-daemon

  build-webhook-gateway:
    name: "Build: webhook-gateway"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/webhook-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - run: gradle build -x test --no-daemon

  build-news-service:
    name: "Build: news-service"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/news-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - run: gradle build -x test --no-daemon

  build-notification:
    name: "Build: notification"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/notification
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - run: gradle build -x test --no-daemon

  auto-merge:
    name: "Auto Merge on CI Pass"
    runs-on: ubuntu-latest
    needs: [build-dividend-engine, build-webhook-gateway, build-news-service, build-notification]
    if: ${{ !contains(needs.*.result, 'failure') }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Merge PR
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              merge_method: 'squash'
            });
