name: CI Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend-dividend-engine:
    name: "Backend: dividend-engine"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/dividend-engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - name: Build & Test
        run: gradle build --no-daemon
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dividend-engine-test-results
          path: services/dividend-engine/build/reports/tests/

  backend-webhook-gateway:
    name: "Backend: webhook-gateway"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/webhook-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - name: Build & Test
        run: gradle build --no-daemon

  frontend-admin:
    name: "Frontend: admin-dashboard"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/admin-dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
