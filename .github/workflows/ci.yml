name: CI Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend-dividend-engine:
    name: "Backend: dividend-engine"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - name: Build
        run: gradle build -x test --no-daemon
      - name: Unit Test (no DB)
        run: gradle test --no-daemon --tests "*CalculationServiceTest" || true

  backend-webhook-gateway:
    name: "Backend: webhook-gateway"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/webhook-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - name: Build & Test
        run: gradle build -x test --no-daemon

  backend-news-service:
    name: "Backend: news-service"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/news-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - name: Build
        run: gradle build -x test --no-daemon

  backend-notification:
    name: "Backend: notification"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/notification
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - name: Build
        run: gradle build -x test --no-daemon
