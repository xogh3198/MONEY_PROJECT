name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 43.200.177.146
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 600
          script: |
            set -e

            # Java 설치 (없으면)
            if ! command -v java &> /dev/null; then
              sudo yum install java-17-amazon-corretto-devel -y
            fi

            # 레포 클론/업데이트
            if [ ! -d ~/MONEY_PROJECT ]; then
              git clone https://github.com/xogh3198/MONEY_PROJECT.git ~/MONEY_PROJECT
            fi
            cd ~/MONEY_PROJECT
            git fetch origin main
            git reset --hard origin/main

            # 기존 프로세스 종료
            pkill -f "dividend-engine" || true
            pkill -f "webhook-gateway" || true
            pkill -f "notification" || true
            pkill -f "news-service" || true
            sleep 2

            # dividend-engine 빌드 & 실행
            cd ~/MONEY_PROJECT/services
            chmod +x gradlew 2>/dev/null || true
            gradle build -x test --no-daemon 2>&1 | tail -5 || ./gradlew build -x test --no-daemon 2>&1 | tail -5
            nohup java -jar build/libs/*.jar --server.port=8080 > ~/logs/dividend-engine.log 2>&1 &

            # webhook-gateway 빌드 & 실행
            cd ~/MONEY_PROJECT/services/webhook-gateway
            gradle build -x test --no-daemon 2>&1 | tail -5 || ./gradlew build -x test --no-daemon 2>&1 | tail -5
            nohup java -jar build/libs/*.jar --server.port=8081 > ~/logs/webhook-gateway.log 2>&1 &

            # notification 빌드 & 실행
            cd ~/MONEY_PROJECT/services/notification
            gradle build -x test --no-daemon 2>&1 | tail -5 || ./gradlew build -x test --no-daemon 2>&1 | tail -5
            nohup java -jar build/libs/*.jar --server.port=8082 > ~/logs/notification.log 2>&1 &

            # news-service 빌드 & 실행
            cd ~/MONEY_PROJECT/services/news-service
            gradle build -x test --no-daemon 2>&1 | tail -5 || ./gradlew build -x test --no-daemon 2>&1 | tail -5
            nohup java -jar build/libs/*.jar --server.port=8083 > ~/logs/news-service.log 2>&1 &

            # 로그 디렉토리 생성
            mkdir -p ~/logs

            echo "=== Deploy Complete ==="
            sleep 3
            curl -s http://localhost:8080/actuator/health || echo "dividend-engine starting..."
            curl -s http://localhost:8083/actuator/health || echo "news-service starting..."

      - name: Report Deploy Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 배포 실패 - ${new Date().toISOString().split('T')[0]}`,
              body: `배포가 실패했습니다.\n\n**커밋:** ${context.sha}\n**로그:** https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['deploy-failed']
            })
