name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 15.164.171.43
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 30m
          script: |
            # 스왑 설정 (없으면 추가 — OOM 방지)
            if [ ! -f /swapfile ]; then
              sudo dd if=/dev/zero of=/swapfile bs=128M count=16
              sudo chmod 600 /swapfile
              sudo mkswap /swapfile
              sudo swapon /swapfile
              echo '/swapfile swap swap defaults 0 0' | sudo tee -a /etc/fstab
            fi

            # 레포 클론 또는 업데이트
            if [ ! -d ~/MONEY_PROJECT ]; then
              git clone https://github.com/xogh3198/MONEY_PROJECT.git ~/MONEY_PROJECT
            fi

            cd ~/MONEY_PROJECT
            git fetch origin main
            git reset --hard origin/main

            # 순차 빌드 (메모리 부족 방지)
            docker compose build dividend-engine
            docker compose build webhook-gateway
            docker compose build notification
            docker compose build news-service

            # 실행
            docker compose up -d

            echo ""
            echo "=== Deploy Complete ==="
            docker compose ps
