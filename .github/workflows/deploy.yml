name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 43.200.177.146
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 30m
          script: |
            # 레포가 없으면 클론
            if [ ! -d ~/MONEY_PROJECT ]; then
              git clone https://github.com/xogh3198/MONEY_PROJECT.git ~/MONEY_PROJECT
            fi

            cd ~/MONEY_PROJECT

            # 로컬 변경 무시하고 강제 최신화
            git fetch origin main
            git reset --hard origin/main

            # 빌드 & 실행
            docker compose down || true
            docker compose up -d --build 2>&1 | tail -100

            echo ""
            echo "=== Deploy Complete ==="
            docker compose ps
