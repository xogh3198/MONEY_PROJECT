name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 43.200.177.146
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/MONEY_PROJECT || git clone https://github.com/xogh3198/MONEY_PROJECT.git ~/MONEY_PROJECT
            cd ~/MONEY_PROJECT
            git pull origin main
            docker compose down
            docker compose up -d --build
            docker system prune -f
