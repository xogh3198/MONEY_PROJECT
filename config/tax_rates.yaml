# 세율 설정 파일
# 코드에서 직접 세율을 하드코딩하지 말고 이 파일에서 로드할 것
# 세법 변경 시 이 파일만 수정하면 전체 서비스에 반영됨

# 기준 연도
reference_year: 2024

# 배당소득세
dividend_tax:
  # 일반 계좌 원천징수 (소득세 14% + 지방소득세 1.4%)
  general_withholding_rate: 0.154
  income_tax_rate: 0.14
  local_tax_rate: 0.014

# ISA (Individual Savings Account)
isa:
  # 연간 납입 한도
  annual_deposit_limit: 20000000  # 2,000만원
  # 의무 가입 기간 (년)
  mandatory_period_years: 3
  # 비과세 한도
  tax_free_limit:
    general: 2000000      # 일반형: 200만원
    special: 4000000      # 서민형/농어민: 400만원
  # 비과세 초과분 분리과세율
  excess_tax_rate: 0.099

# IRP (Individual Retirement Pension)
irp:
  # 연간 납입 한도 (DC형 퇴직연금 포함)
  annual_deposit_limit: 18000000  # 1,800만원
  # 세액공제율
  tax_deduction_rate:
    below_55m: 0.165      # 총급여 5,500만원 이하: 16.5%
    above_55m: 0.132      # 총급여 5,500만원 초과: 13.2%
  # 연금소득세 (수령 시)
  pension_income_tax:
    age_below_70: 0.055   # 70세 미만: 5.5%
    age_70_to_80: 0.044   # 70~80세: 4.4%
    age_above_80: 0.033   # 80세 이상: 3.3%

# 해외주식 배당
overseas_dividend:
  # 미국 원천징수율
  us_withholding_rate: 0.15
  # 기타 국가 (필요 시 추가)
  default_withholding_rate: 0.15

# 금융소득종합과세
comprehensive_tax:
  # 연간 금융소득 기준
  threshold: 20000000     # 2,000만원 초과 시 종합과세
