version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dividend_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/db/init.sql:/docker-entrypoint-initdb.d/init.sql

  dividend-engine:
    build: ./services/dividend-engine
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/dividend_bot
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    depends_on:
      - postgres

  webhook-gateway:
    build: ./services/webhook-gateway
    ports:
      - "8081:8081"
    environment:
      DIVIDEND_ENGINE_URL: http://dividend-engine:8080
    depends_on:
      - dividend-engine

  admin-dashboard:
    build: ./services/admin-dashboard
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8080

volumes:
  postgres_data:
