spring:
  application:
    name: news-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/dividend_bot}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true

server:
  port: 8083

# 네이버 뉴스 검색 API
naver:
  api:
    client-id: ${NAVER_CLIENT_ID:}
    client-secret: ${NAVER_CLIENT_SECRET:}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info

jwt:
  secret: ${JWT_SECRET:default-secret-key-for-development-only-change-in-production-32chars}
