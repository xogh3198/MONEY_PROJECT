spring:
  application:
    name: news-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/dividend_bot}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true

server:
  port: 8083

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
